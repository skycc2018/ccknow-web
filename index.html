<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{title} - ccknow</title>
    <style>
        
:root {
    --sidebar-width: 300px;
    --topbar-height: 56px;
    --bg: #f8fafc;
    --surface: #ffffff;
    --surface-2: #f1f5f9;
    --text: #0f172a;
    --text-secondary: #64748b;
    --border: #e2e8f0;
    --primary: #2563eb;
    --primary-light: #eff6ff;
    --primary-dark: #1d4ed8;
    --accent: #7c3aed;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(15,23,42,0.04), 0 1px 2px rgba(15,23,42,0.02);
    --shadow-lg: 0 10px 40px rgba(15,23,42,0.08);
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
}
[data-theme="dark"] {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface-2: #27354c;
    --text: #f1f5f9;
    --text-secondary: #94a3b8;
    --border: #334155;
    --primary: #60a5fa;
    --primary-light: rgba(96,165,250,0.12);
    --primary-dark: #93c5fd;
    --accent: #a78bfa;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-lg: 0 10px 40px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
    margin: 0;
    font-family: var(--font-sans);
    color: var(--text);
    background: var(--bg);
    display: flex;
    min-height: 100vh;
    line-height: 1.65;
    transition: background 0.3s, color 0.3s;
}
.topbar {
    position: fixed;
    top: 0;
    left: var(--sidebar-width);
    right: 0;
    height: var(--topbar-height);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    z-index: 100;
    box-shadow: var(--shadow);
}
.breadcrumbs { font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.breadcrumbs a { color: var(--text-secondary); text-decoration: none; }
.breadcrumbs a:hover { color: var(--primary); }
.breadcrumbs .sep { opacity: 0.5; }
.topbar-actions { display: flex; align-items: center; gap: 12px; }
.search-box { position: relative; width: 280px; }
.search-box input {
    width: 100%;
    padding: 9px 14px 9px 38px;
    border: 1px solid var(--border);
    border-radius: 24px;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: all 0.15s;
}
.search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
.search-box::before {
    content: "";
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px;
    border: 2px solid var(--text-secondary);
    border-radius: 50%;
    opacity: 0.6;
}
.search-box::after {
    content: "";
    position: absolute;
    left: 24px;
    top: calc(50% + 5px);
    width: 2px; height: 7px;
    background: var(--text-secondary);
    transform: rotate(-45deg);
    opacity: 0.6;
}
.search-results {
    position: absolute;
    top: 48px;
    right: 0;
    width: 360px;
    max-height: 400px;
    overflow-y: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    display: none;
    z-index: 200;
    padding: 6px;
}
.search-results.active { display: block; }
.search-results a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    color: var(--text);
    border-radius: var(--radius-sm);
    font-size: 13.5px;
    text-decoration: none;
}
.search-results a:hover { background: var(--bg); }
.search-results a .path { font-size: 11px; color: var(--text-secondary); }
.search-results .empty { padding: 20px; text-align: center; color: var(--text-secondary); font-size: 13px; }
.icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
}
.icon-btn:hover { background: var(--primary-light); border-color: var(--primary); }
.mobile-menu-btn { display: none; }
.sidebar {
    width: var(--sidebar-width);
    background: var(--surface);
    border-right: 1px solid var(--border);
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    overflow-y: auto;
    padding: 20px 0 100px;
    z-index: 90;
    box-shadow: var(--shadow);
}
.sidebar-header {
    padding: 0 18px 14px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
}
.sidebar-header a.brand {
    color: var(--text);
    text-decoration: none;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.8px;
    display: flex;
    align-items: center;
    gap: 10px;
}
.sidebar-header .brand-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 18px;
    font-weight: 800;
}
.sidebar-header .home {
    font-size: 12px;
    color: var(--text-secondary);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    padding: 5px 12px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    font-weight: 600;
    text-decoration: none;
}
.nav-tools {
    padding: 0 18px 12px;
    display: flex;
    gap: 8px;
}
.nav-tools button {
    font-size: 11px;
    padding: 5px 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: 6px;
    cursor: pointer;
    color: var(--text-secondary);
    font-weight: 600;
    transition: all 0.15s;
}
.nav-tools button:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
.nav ul {
    list-style: none;
    padding-left: 0;
    margin: 0;
}
.nav li { margin: 1px 0; }
.nav li.folder > span.folder-toggle {
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.4px;
    padding: 8px 18px;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s;
    border-radius: 0 8px 8px 0;
    margin-right: 10px;
}
.nav li.folder > span.folder-toggle:hover { color: var(--primary); background: var(--bg); }
.nav li.folder > span .folder-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px; height: 16px;
    color: var(--text-secondary);
    font-size: 10px;
    transition: transform 0.2s;
}
.nav li.folder.collapsed > span .folder-icon { transform: rotate(-90deg); }
.nav li.folder.collapsed > ul { display: none; }
.nav li a {
    display: flex;
    align-items: center;
    padding: 7px 18px 7px 34px;
    color: var(--text);
    text-decoration: none;
    font-size: 13.5px;
    border-radius: 0 8px 8px 0;
    margin-right: 10px;
    transition: all 0.15s;
}
.nav li a:hover { background: var(--bg); color: var(--primary); }
.nav li.active > a {
    background: var(--primary-light);
    color: var(--primary-dark);
    font-weight: 700;
}
.nav li.active > a::before {
    content: "";
    width: 6px; height: 6px;
    background: var(--primary);
    border-radius: 50%;
    margin-right: 8px;
}
.content {
    margin-left: var(--sidebar-width);
    margin-top: var(--topbar-height);
    flex: 1;
    padding: 40px 64px 100px;
    max-width: 960px;
    background: var(--surface);
    min-height: calc(100vh - var(--topbar-height));
}
.content h1 {
    font-size: 36px;
    font-weight: 800;
    margin: 0 0 18px;
    letter-spacing: -1px;
    line-height: 1.2;
}
.content h2 {
    font-size: 24px;
    font-weight: 700;
    margin: 44px 0 18px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
}
.content h3 {
    font-size: 19px;
    font-weight: 700;
    margin: 30px 0 14px;
}
.content p { margin: 16px 0; color: var(--text-secondary); }
.content a { color: var(--primary); text-decoration: none; }
.content a:hover { text-decoration: underline; }
.content a.wikilink { color: var(--accent); font-weight: 600; }
.content a.wikilink:hover { text-decoration: underline; }
.content a.missing { color: var(--text-secondary); text-decoration: line-through; opacity: 0.6; cursor: not-allowed; }
.content code {
    background: var(--surface-2);
    padding: 2px 7px;
    border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 0.86em;
    color: #db2777;
}
.content pre {
    background: #0f172a;
    color: #f8fafc;
    padding: 22px;
    border-radius: var(--radius);
    overflow-x: auto;
    font-size: 14px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(255,255,255,0.05);
}
.content pre code { background: transparent; color: inherit; padding: 0; }
.content blockquote {
    border-left: 4px solid var(--primary);
    background: var(--primary-light);
    padding: 18px 22px;
    border-radius: 0 var(--radius) var(--radius) 0;
    margin: 20px 0;
}
.content blockquote p { margin: 0; color: inherit; }
.content ul, .content ol { padding-left: 24px; }
.content li { margin: 8px 0; }
.content table {
    border-collapse: separate;
    border-spacing: 0;
    width: 100%;
    margin: 26px 0;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    font-size: 14px;
}
.content th, .content td {
    border: none;
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    text-align: left;
}
.content th {
    background: var(--bg);
    font-weight: 700;
    font-size: 12px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.4px;
}
.content tr:last-child td { border-bottom: none; }
.content tr:hover td { background: var(--bg); }
.back-to-top {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    visibility: hidden;
    transition: all 0.2s;
    z-index: 80;
}
.back-to-top.visible { opacity: 1; visibility: visible; }
.back-to-top:hover { background: var(--primary); color: #fff; border-color: var(--primary); transform: translateY(-2px); }
@media (max-width: 768px) {
    :root { --sidebar-width: 0; }
    .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s;
        width: 280px;
    }
    .sidebar.open { transform: translateX(0); }
    .topbar { left: 0; padding: 0 16px; }
    .content { margin-left: 0; padding: 28px 20px 80px; }
    .search-box { display: none; }
    .mobile-menu-btn { display: flex; }
    .breadcrumbs { display: none; }
}

        {extra_css}
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a class="brand" href="{home_url}"><span class="brand-icon">C</span> ccknow</a>
            <a class="home" href="{home_url}">🏠 返回首页</a>
        </div>
        <div class="nav-tools">
            <button onclick="expandAll()">展开全部</button>
            <button onclick="collapseAll()">折叠全部</button>
        </div>
        <nav class="nav">
            <ul>{nav}</ul>
        </nav>
    </aside>
    <header class="topbar">
        <button class="icon-btn mobile-menu-btn" onclick="toggleSidebar()" title="菜单">☰</button>
        <div class="breadcrumbs">{breadcrumbs}</div>
        <div class="topbar-actions">
            <div class="search-box">
                <input type="text" id="search" placeholder="搜索页面..." oninput="searchPages(this.value)" onfocus="showSearch()" onblur="hideSearchDelayed()">
                <div class="search-results" id="search-results"></div>
            </div>
            <button class="icon-btn" onclick="toggleTheme()" title="切换主题">🌙</button>
        </div>
    </header>
    <main class="content">
{body}
    </main>
    <button class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" id="back-to-top">↑</button>
    <script>
        const searchIndex = {search_index};
        const pathMatrix = {path_matrix};
        const currentTitle = {current_title_json};
        function toggleFolder(el) {
            const li = el.parentElement;
            li.classList.toggle('collapsed');
            const icon = el.querySelector('.folder-icon');
            icon.innerHTML = li.classList.contains('collapsed') ? '&#9656;' : '&#9662;';
        }
        function expandAll() {
            document.querySelectorAll('.nav li.folder').forEach(li => {
                li.classList.remove('collapsed');
                li.querySelector('.folder-icon').innerHTML = '&#9662;';
            });
        }
        function collapseAll() {
            document.querySelectorAll('.nav li.folder').forEach(li => {
                li.classList.add('collapsed');
                li.querySelector('.folder-icon').innerHTML = '&#9656;';
            });
        }
        function toggleTheme() {
            const html = document.documentElement;
            html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
            localStorage.setItem('theme', html.getAttribute('data-theme'));
        }
        function searchPages(query) {
            const results = document.getElementById('search-results');
            if (!query) { results.innerHTML = ''; results.classList.remove('active'); return; }
            const q = query.toLowerCase();
            const matched = searchIndex.filter(p => p.title.toLowerCase().includes(q) || p.path.toLowerCase().includes(q)).slice(0, 10);
            if (matched.length === 0) { results.innerHTML = '<div class="empty">未找到结果</div>'; }
            else {
                const matrix = pathMatrix[currentTitle] || {};
                results.innerHTML = matched.map(p => {
                    const url = matrix[p.title] || p.path;
                    return `<a href="${url}"><span>${p.title}</span><span class="path">${p.path}</span></a>`;
                }).join('');
            }
            results.classList.add('active');
        }
        function showSearch() { if (document.getElementById('search').value) document.getElementById('search-results').classList.add('active'); }
        function hideSearchDelayed() { setTimeout(() => document.getElementById('search-results').classList.remove('active'), 200); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('theme');
            if (saved) {
                document.documentElement.setAttribute('data-theme', saved);
            } else {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            }
            window.addEventListener('scroll', () => {
                document.getElementById('back-to-top').classList.toggle('visible', window.scrollY > 300);
            });
        });
        {extra_script}
    </script>
</body>
</html>
